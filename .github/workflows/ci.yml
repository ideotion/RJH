name: CI

# RJH's core is pure stdlib, so CI needs no dependencies — it just byte-compiles
# the app and runs the offline test suite (no network) across supported Pythons.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile (syntax check)
        run: python -m py_compile rjh.py

      - name: Offline tests (stdlib only, no network)
        run: python -m unittest discover -s tests -p "test_*.py" -v
